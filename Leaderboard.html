<script>
    let myData = [];
    let personalData = [];

    var httpRequestAllGames = new XMLHttpRequest();
    httpRequestAllGames.onreadystatechange = function () {
        if (httpRequestAllGames.readyState == 4 && httpRequestAllGames.status == 200) {
            myData = JSON.parse(httpRequestAllGames.responseText);
            sortDataByDuration(); // Sort the data by duration before populating the table
            populateLeaderboardTables();
        }
    };
    httpRequestAllGames.open('GET', 'getGame.php');
    httpRequestAllGames.send();

    function formatDuration(totalSeconds) {
        const minutes = Math.floor(totalSeconds / 60);
        const seconds = totalSeconds % 60;
        const formattedDuration = `${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
        return formattedDuration;
    }

    function sortDataByDuration() {
        myData.sort((a, b) => a[2] - b[2]); // Sort by the third element (duration)
    }

    function populateLeaderboardTables() {
        const allLeaderboardBody = document.getElementById('allLeaderboardBody');

        // Clear existing rows
        allLeaderboardBody.innerHTML = '';

        // Populate all leaderboard table
        myData.forEach(data => {
            let score;
            let duration;
            const row = document.createElement('tr');
            if (data[1] == 1) {
                score = "Player 1 Won!"
            } else {
                score = "Player 2 Won!";
            }
            let fullTime = data[2];
            duration = formatDuration(fullTime);
            row.innerHTML = `<td>${data[0]}</td>
                             <td>${score}</td>
                             <td>${duration}</td>
                             <td>${data[3]}</td>
                             <td>${data[4]}</td>`;
            allLeaderboardBody.appendChild(row);
        });
    }
</script>
